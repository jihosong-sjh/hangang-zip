spring:
  application:
    name: hangang-zip-backend
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8081

app:
  cors:
    allowed-origin: http://localhost:5173

logging:
  level:
    org.hibernate.SQL: debug
